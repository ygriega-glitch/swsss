<!DOCTYPE html>
<html>
<head>
  <title>Scale My Business</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>SMB</h2>

    <button>Dashboard</button>
    <button>Campaigns</button>
    <button>Rewards</button>
    <button>Leads</button>
    <button>Analytics</button>
    <button>QR Codes</button>
    <button>Help Center</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1>Dashboard</h1>

    <!-- STATS -->
    <div class="cards">
      <div class="card">Scans: 0</div>
      <div class="card">Leads: 0</div>
      <div class="card">Conversion: 0%</div>
      <div class="card">Rewards: 0</div>
    </div>

    <!-- CREATE CAMPAIGN -->
    <div class="section">
      <h2>Create Campaign</h2>

      <input id="campaignName" placeholder="Business Name">
      <input id="reviewLink" placeholder="Google Review Link">

      <button>Create Campaign</button>
    </div>

  </div>

</div>

</body>
</html>
