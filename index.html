<!DOCTYPE html>
<html>
<head>
  <title>Scale My Business</title>

  <link rel="stylesheet" href="style.css">

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- QR GENERATOR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Scale My Business</h2>

    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('campaigns')">Campaigns</button>
    <button onclick="showSection('qr')">QR Codes</button>
    <button onclick="showSection('help')">Help Center</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="sectionPage">
      <h1>Dashboard</h1>

      <div class="cards">
        <div class="card">Scans: 0</div>
        <div class="card">Leads: 0</div>
        <div class="card">Conversion: 0%</div>
        <div class="card">Rewards: 0</div>
      </div>
    </div>

    <!-- CAMPAIGNS -->
    <div id="campaigns" class="sectionPage">
      <h1>Create Campaign</h1>

      <input id="campaignName" placeholder="Business Name">
      <input id="reviewLink" placeholder="Google Review Link">

      <button onclick="createCampaign()">Create Campaign</button>

      <div id="result"></div>
    </div>

    <!-- QR -->
    <div id="qr" class="sectionPage">
      <h1>QR Generator</h1>

      <div id="qrBox"></div>
      <p id="qrLink"></p>
    </div>

    <!-- HELP -->
    <div id="help" class="sectionPage">
      <h1>Help Center</h1>

      <p><strong>Why reviews matter:</strong></p>
      <p>If you see 4.7⭐ with many reviews vs 3.9⭐ with few… which one do you trust?</p>

      <p><strong>Best phrase:</strong></p>
      <p>"Leave us a review and get a reward 🎁"</p>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
