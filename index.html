<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Scale My Business</title>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #1c0a06;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: #8b2c1b;
      height: 100vh;
      position: fixed;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .main {
      margin-left: 240px;
      padding: 30px;
    }

    .section {
      display: none;
    }

    .active {
      display: block;
    }

    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 300px;
    }

    button.main-btn {
      background: #6e1f10;
      padding: 10px 20px;
      border: none;
      color: white;
      cursor: pointer;
    }

    #qr canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>Scale My Business</h2>

  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('campaign')">Campaigns</button>
  <button onclick="show('qr')">QR Codes</button>
</div>

<div class="main">

  <div id="dashboard" class="section active">
    <h1>Dashboard</h1>
    <p>Ready</p>
  </div>

  <div id="campaign" class="section">
    <h1>Create Campaign</h1>

    <input id="name" placeholder="Business Name">
    <input id="link" placeholder="Google Review Link">

    <button class="main-btn" onclick="create()">Create Campaign</button>

    <div id="result"></div>
  </div>

  <div id="qr" class="section">
    <h1>QR Code</h1>

    <div id="qrcode"></div>
    <p id="qrtext"></p>
  </div>

</div>

<script>
  function show(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  const supabase = window.supabase.createClient(
    "https://npukjptnqdlvwkejobby.supabase.co",
    "sb_publishable_4Gq4e044KeJvhdrdXHCKQw_gWQrAs30"
  );

  async function create() {
    const name = document.getElementById("name").value;
    const link = document.getElementById("link").value;

    if (!name || !link) {
      alert("Fill fields");
      return;
    }

    const { data, error } = await supabase
      .from("campaigns")
      .insert([{ name, google_review_link: link }])
      .select();

    if (error) {
      alert("Error");
      console.log(error);
      return;
    }

    const id = data[0].id;

    const url = window.location.origin + "/play.html?campaign=" + id;

    document.getElementById("result").innerHTML = url;

    // QR
    document.getElementById("qrcode").innerHTML = "";
    QRCode.toCanvas(url, function (err, canvas) {
      document.getElementById("qrcode").appendChild(canvas);
    });

    document.getElementById("qrtext").innerText = url;

    show("qr");
  }
</script>

</body>
</html>
